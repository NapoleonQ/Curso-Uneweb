<!DOCTYPE html>
<html lang="en">
<head>
    <title>Formulario</title>
</head>
<body>
    <h1>Formulario</h1>
    <form action="enviar.php" method="post">
        <p>
            <label for="nombre">Nombre:
                <input type="text" id="nombre">
            </label>
        </p>
        
        <p>
            <label for="apellido">Apellido
                <input type="text" id="apellido">
            </label>
        </p>
        
        <p>
            <label for="edad">Edad:
                <input type="text" id="edad">
            </label>
        </p>
        
        <p>
            <label for="asunto">Observacion:
                <textarea id="asunto"></textarea>
            </label>        
        </p>
        
        <p>
            <label>Horario
                <select id="horario">
                    <option value="manana" disabled>Mañana</option>
                    <option value="tarde">Tarde</option>
                    <option value="noche" selected>Noche</option>
                </select>
            </label>
        </p>
        
        <h2>Preparacion:</h2>
            <input type="checkbox" value="principiante"><label>Principiante</label><br>
            <input type="checkbox" value="intermedio"><label>Intermedio</label><br>
            <input type="checkbox" value="avanzado"><label>Avanzado</label><br>
        
        
        
        
        
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
