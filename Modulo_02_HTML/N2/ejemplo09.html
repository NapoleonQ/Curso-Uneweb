<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo09</title>
    <style>
        #div1, #div2{
            width: 200px;
            height: 200px;
            padding: 10px;
            border: 2px solid;
        }
        
        #div1{
            border-color: red;
        }
        
        #div2{
            border-color: blue;
        }
    </style>
</head>
<body>
    <h1>Ejemplo09 - API Avanzada DRAG AND DROP</h1>
    <div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)">
        <br>
    </div>
    <div id="div2" ondrop="drop(event)" ondragover="allowDrop(event)">
        <img src="img/software.jpg" id="imagen" width="200px" height="200px" draggable="true" ondragstart="drag(event)">
    </div>
    <script>
        function allowDrop(ev){
            ev.preventDefault();
        }
        function drag(ev){
            ev.dataTransfer.setData("text",ev.target.id);
        }
        function drop(ev){
            ev.preventDefault();
            var data = ev.dataTransfer.getData("text");
            ev.target.appendChild(document.getElementById(data));
        }
    </script>
</body>
</html>
