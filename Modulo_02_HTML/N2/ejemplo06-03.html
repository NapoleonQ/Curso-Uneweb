<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo06-03</title>
</head>
<body>
    <h1>Ejemplo06-03 | Web Storage - Session Storage</h1>
    <div id="contenido"></div>
    <script>
        var contenido = document.getElementById('contenido');
        
        sessionStorage.nombreCurso = "Curso de Html5";
        sessionStorage.nivelCurso = "Dos";
    
        contenido.innerHTML = "Contenido de las Variables de Session<br>";
        contenido.innerHTML += sessionStorage.nombreCurso + "<br>";
        contenido.innerHTML += sessionStorage.nivelCurso; + "<br>";
        

        console.warn(sessionStorage.nombreCurso);
        console.warn(sessionStorage.nivelCurso);
    </script>
</body>
</html>
