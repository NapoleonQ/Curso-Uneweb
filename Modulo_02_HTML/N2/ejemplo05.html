<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo05</title>
</head>
<body>
    <h1>Ejemplo05 - Canvas y Graficos 2D</h1>
    <canvas id="lienzo" width="700px" height="700px"></canvas>

    <script>
        var dibujo = document.getElementById("lienzo");
        var ctx = dibujo.getContext("2d");
        var colores = ["yellow","blue","red","orange","purple","green","pink"];
        colores.sort();
        var x = 0, y = 0;
        for (var i=0; i<colores.length; i++){
            ctx.fillStyle = colores[i];
            ctx.fillRect(x,y,100,100);
            x = x + 100;
            y = y + 100;
        }

        /*
        ctx.fillStyle = "green";
        ctx.fillRect(0,0,100,100);
        */

    </script>
</body>
</html>
