<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
        }
    </style>

</head>
<body>
    <table style="width: 100%">
        <tr>
            <th>Nombre:</th>
            <th>Ciudad:</th>
            <th>Pais:</th>
        </tr>
        <tr>
            <td>Roberto Mendoza</td>
            <td>Valencia</td>
            <td>Venezuela</td>
        </tr>
        <tr>
            <td>Carlos Robles</td>
            <td>Buenos Aires</td>
            <td>Argentina</td>
        </tr>
        <tr>
            <td>Sofia Blanco</td>
            <td>Santiago</td>
            <td>Chile</td>
        </tr>
    </table>
</body>
</html>
